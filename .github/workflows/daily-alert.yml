name: Daily Combined Risk Alert

on:
  schedule:
    # UTC 05:00 = KST 14:00, 평일만
    - cron: '0 5 * * 1-5'
  workflow_dispatch:
    # 수동 실행 (테스트용)

jobs:
  run-alert:
    runs-on: ubuntu-latest
    steps:
      - name: Call combined-risk cron endpoint
        run: |
          response=$(curl -s -o /tmp/response.json -w "%{http_code}" \
            -X GET \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            "${{ secrets.APP_URL }}/api/cron/combined-risk")

          echo "HTTP status: $response"
          echo "Response body:"
          cat /tmp/response.json

          if [ "$response" -lt 200 ] || [ "$response" -ge 300 ]; then
            echo "Cron endpoint returned error status: $response"
            exit 1
          fi
